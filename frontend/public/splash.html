<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body {
  background: #111827;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.mark {
  width: 56px; height: 56px; border-radius: 14px;
  background: linear-gradient(135deg, #F9FAFB 0%, #D1D5DB 100%);
  color: #111827; font-size: 28px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 4px 20px rgba(249, 250, 251, 0.15);
}
.wordmark {
  font-size: 14px; font-weight: 700; letter-spacing: 4px;
  color: #F9FAFB; margin-bottom: 20px;
}
.bar {
  width: 100px; height: 3px; border-radius: 2px;
  background: #374151; overflow: hidden;
}
.fill {
  width: 40%; height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #F9FAFB, #9CA3AF);
  animation: slide 1.5s ease-in-out infinite;
}
.status {
  margin-top: 10px; font-size: 11px; color: #9CA3AF;
  letter-spacing: 0.5px;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes slide { 0%{transform:translateX(-100%)} 50%{transform:translateX(200%)} 100%{transform:translateX(-100%)} }
</style>
</head>
<body>
<div class="mark">C</div>
<div class="wordmark">CHRONICLE</div>
<div class="bar"><div class="fill"></div></div>
<div class="status">Starting up…</div>
</body>
</html>
